name: Deploy OpenClaw TradeDesk

# Runs automatically on push to main (with POC defaults).
# Manual dispatch allows selecting deployment variants.
# Secrets are injected over SSH — nothing sensitive touches the repo.

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      enable_telegram:
        description: "Enable Telegram channel"
        type: boolean
        default: true
      enable_discord:
        description: "Enable Discord channel"
        type: boolean
        default: false
      enable_whatsapp:
        description: "Enable WhatsApp channel"
        type: boolean
        default: false
      enable_slack:
        description: "Enable Slack channel"
        type: boolean
        default: false
      installation_method:
        description: "OpenClaw installation method"
        type: choice
        options:
          - installer
          - docker
        default: installer
      gateway_bind:
        description: "Gateway bind mode"
        type: choice
        options:
          - loopback
          - tailnet
        default: loopback
      auth_mode:
        description: "Gateway authentication mode"
        type: choice
        options:
          - token
          - password
          - tailscale
        default: token
      session_isolation:
        description: "Session isolation scope"
        type: choice
        options:
          - main
          - per-channel-peer
          - per-account-channel-peer
        default: per-channel-peer
      dm_policy:
        description: "DM policy for channels"
        type: choice
        options:
          - pairing
          - allowlist
          - open
        default: pairing
      cron_mode:
        description: "Cron execution mode"
        type: choice
        options:
          - main
          - isolated
        default: isolated
      memory_provider:
        description: "Semantic memory search provider"
        type: choice
        options:
          - ollama
          - openai
          - none
        default: ollama
      process_manager:
        description: "Process management method"
        type: choice
        options:
          - systemd
          - docker-compose
        default: systemd
      enable_nginx_proxy:
        description: "Enable Nginx reverse proxy"
        type: boolean
        default: false
      enable_webhooks:
        description: "Enable external webhooks"
        type: boolean
        default: false
      otel_exporter:
        description: "OpenTelemetry exporter"
        type: choice
        options:
          - none
          - grafana
          - datadog
          - otel-collector
        default: none

jobs:
  deploy:
    name: Deploy OpenClaw TradeDesk
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      # ── Build channels list from inputs ──────────────────────────────────
      - name: Build deployment parameters
        id: params
        run: |
          # Build comma-separated channel list
          CHANNELS=""
          ENABLE_TG="${{ inputs.enable_telegram }}"
          ENABLE_DC="${{ inputs.enable_discord }}"
          ENABLE_WA="${{ inputs.enable_whatsapp }}"
          ENABLE_SL="${{ inputs.enable_slack }}"

          # Default to true for telegram on push events (no inputs)
          if [ -z "$ENABLE_TG" ] || [ "$ENABLE_TG" = "true" ]; then
            CHANNELS="telegram"
          fi
          if [ "$ENABLE_DC" = "true" ]; then
            CHANNELS="${CHANNELS:+$CHANNELS,}discord"
          fi
          if [ "$ENABLE_WA" = "true" ]; then
            CHANNELS="${CHANNELS:+$CHANNELS,}whatsapp"
          fi
          if [ "$ENABLE_SL" = "true" ]; then
            CHANNELS="${CHANNELS:+$CHANNELS,}slack"
          fi
          # Fallback to telegram if nothing selected
          CHANNELS="${CHANNELS:-telegram}"
          echo "channels=$CHANNELS" >> "$GITHUB_OUTPUT"
          echo "Channels: $CHANNELS"

      # ── Docker build + push (only for Docker installs) ─────────────────
      - name: Checkout repo (for Docker build)
        if: inputs.installation_method == 'docker'
        uses: actions/checkout@v4

      - name: Build and transfer Docker image
        if: inputs.installation_method == 'docker'
        run: |
          docker build -f deploy/docker/Dockerfile -t openclaw-tradedesk:latest .
          docker save openclaw-tradedesk:latest | gzip > /tmp/openclaw-tradedesk.tar.gz

      - name: SCP Docker image to server
        if: inputs.installation_method == 'docker'
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          source: /tmp/openclaw-tradedesk.tar.gz
          target: /tmp/

      # ── Main deployment via SSH ────────────────────────────────────────
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          # Core secrets
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENCLAW_GATEWAY_TOKEN: ${{ secrets.OPENCLAW_GATEWAY_TOKEN }}
          # Channel secrets
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_USER_ID: ${{ secrets.TELEGRAM_USER_ID }}
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_APP_TOKEN: ${{ secrets.SLACK_APP_TOKEN }}
          # Optional secrets
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          WEBHOOK_SECRET: ${{ secrets.WEBHOOK_SECRET }}
          WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
          OPENCLAW_GATEWAY_PASSWORD: ${{ secrets.OPENCLAW_GATEWAY_PASSWORD }}
          OTEL_EXPORTER_OTLP_ENDPOINT: ${{ secrets.OTEL_EXPORTER_OTLP_ENDPOINT }}
          DATADOG_API_KEY: ${{ secrets.DATADOG_API_KEY }}
          GRAFANA_PUSH_URL: ${{ secrets.GRAFANA_PUSH_URL }}
          # Deployment variant selectors
          DEPLOY_CHANNELS: ${{ steps.params.outputs.channels }}
          DEPLOY_INSTALL_METHOD: ${{ inputs.installation_method || 'installer' }}
          DEPLOY_GATEWAY_BIND: ${{ inputs.gateway_bind || 'loopback' }}
          DEPLOY_AUTH_MODE: ${{ inputs.auth_mode || 'token' }}
          DEPLOY_SESSION_SCOPE: ${{ inputs.session_isolation || 'per-channel-peer' }}
          DEPLOY_DM_POLICY: ${{ inputs.dm_policy || 'pairing' }}
          DEPLOY_CRON_MODE: ${{ inputs.cron_mode || 'isolated' }}
          DEPLOY_MEMORY_PROVIDER: ${{ inputs.memory_provider || 'ollama' }}
          DEPLOY_PROCESS_MANAGER: ${{ inputs.process_manager || 'systemd' }}
          DEPLOY_NGINX_PROXY: ${{ inputs.enable_nginx_proxy || 'false' }}
          DEPLOY_WEBHOOKS: ${{ inputs.enable_webhooks || 'false' }}
          DEPLOY_OTEL_EXPORTER: ${{ inputs.otel_exporter || 'none' }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          envs: >-
            ANTHROPIC_API_KEY,OPENCLAW_GATEWAY_TOKEN,
            TELEGRAM_BOT_TOKEN,TELEGRAM_USER_ID,
            DISCORD_BOT_TOKEN,SLACK_BOT_TOKEN,SLACK_APP_TOKEN,
            OPENAI_API_KEY,WEBHOOK_SECRET,WEBHOOK_URL,
            OPENCLAW_GATEWAY_PASSWORD,
            OTEL_EXPORTER_OTLP_ENDPOINT,DATADOG_API_KEY,GRAFANA_PUSH_URL,
            DEPLOY_CHANNELS,DEPLOY_INSTALL_METHOD,DEPLOY_GATEWAY_BIND,
            DEPLOY_AUTH_MODE,DEPLOY_SESSION_SCOPE,DEPLOY_DM_POLICY,
            DEPLOY_CRON_MODE,DEPLOY_MEMORY_PROVIDER,DEPLOY_PROCESS_MANAGER,
            DEPLOY_NGINX_PROXY,DEPLOY_WEBHOOKS,DEPLOY_OTEL_EXPORTER
          timeout: 600s
          script: |
            set -e

            # Bootstrap PATH
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
            export PATH="$HOME/.local/bin:$HOME/.npm/bin:/usr/local/bin:$PATH"

            # Load Docker image if applicable
            if [ "${DEPLOY_INSTALL_METHOD}" = "docker" ] && [ -f /tmp/openclaw-tradedesk.tar.gz ]; then
              echo "==> Loading Docker image..."
              docker load < /tmp/openclaw-tradedesk.tar.gz
              rm -f /tmp/openclaw-tradedesk.tar.gz
            fi

            # Sync workspace (deploy.sh also does this, but we need it to get deploy.sh itself)
            WORKSPACE="$HOME/.openclaw/workspace"
            if [ -d "$WORKSPACE/.git" ]; then
              git -C "$WORKSPACE" fetch origin main
              git -C "$WORKSPACE" reset --hard origin/main
            else
              mkdir -p "$HOME/.openclaw"
              git clone https://github.com/Sensini7/OpenClaw-TradeDesk.git "$WORKSPACE"
            fi

            # Run the main deploy script
            chmod +x "$WORKSPACE/deploy/deploy.sh"
            chmod +x "$WORKSPACE/deploy/assemble-config.sh"
            bash "$WORKSPACE/deploy/deploy.sh"
